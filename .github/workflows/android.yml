name: Build hermes-android-bridge APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download gradle wrapper jar
        run: curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" -o hermes-android-bridge/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x hermes-android-bridge/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: hermes-android-bridge

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-bridge
          path: hermes-android-bridge/app/build/outputs/apk/debug/*.apk

      - name: Upload to Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: hermes-android-bridge/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
